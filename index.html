<body>
    <div class="container">
        <h1>Library Section Checker</h1>
        <hr>

        <label for="sectionData">Enter a section:</label>
        <input type="text" class="form-control" id="sectionData" placeholder="F, N, R">
        <br>
        <p id="section">Library Section:</p>

        <button type="button" class="btn btn-info" onclick="checkSection()">Check</button>
        <button type="button" class="btn btn-warning" onclick="window.location.reload()">Refresh</button>
    </div>

<script src="main.js"></script>
